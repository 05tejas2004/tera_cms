{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4><i class="fas fa-sign-in-alt"></i> Login</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" 
                                   name="password" 
                                   id="passwordField" 
                                   class="form-control" 
                                   required
                                   style="border-right: none;">
                            <button type="button" 
                                    class="input-group-text bg-secondary" 
                                    onclick="togglePassword()"
                                    style="border-left: 1px solid #444; cursor: pointer; min-width: 45px;">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <span class="text-muted">New User?</span>
                    <div class="mt-2">
                        <a href="{{ url_for('register') }}" class="btn btn-outline-info btn-sm">
                            <i class="fas fa-user-plus"></i> Register Here
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    var passwordInput = document.getElementById('passwordField');
    var eyeIcon = document.getElementById('eyeIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'fas fa-eye-slash';
    } else {
        passwordInput.type = 'password';
        eyeIcon.className = 'fas fa-eye';
    }
}
</script>

<style>
@media (max-width: 768px) {
    .col-md-5 {
        margin: 10px;
    }
    
    .card-body {
        padding: 20px 15px !important;
    }
    
    .input-group-text {
        min-width: 45px;
    }
    
    .btn-lg {
        padding: 12px;
        font-size: 15px;
    }
}

@media (hover: none) and (pointer: coarse) {
    /* Touch-friendly on mobile */
    .input-group-text {
        min-width: 50px;
    }
    
    button[onclick="togglePassword()"] {
        padding: 10px;
    }
}
</style>
{% endblock %}
