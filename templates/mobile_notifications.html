<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #00d26a;
            --border: #333333;
            --danger: #dc3545;
        }
        body { 
            background: var(--bg-dark); 
            color: var(--text-primary);
        }
        .navbar { 
            background: linear-gradient(135deg, #00d26a 0%, #00a854 100%) !important;
        }
        .notif-card {
            background: var(--bg-card); border-radius: 10px; padding: 15px;
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .notif-card.unread { border-left: 4px solid var(--accent); }
        .badge { color: #000; font-weight: bold; }
        .btn-outline-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        h5 { color: var(--text-primary); }
        p { color: var(--text-secondary); }
        .text-muted { color: var(--text-secondary) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <a href="{{ url_for('mobile_dashboard') }}" class="text-white text-decoration-none">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <span class="navbar-brand">Notifications</span>
        </div>
    </nav>

    <div class="container mt-3 px-3">
        {% if not notifications %}
        <div class="text-center mt-5 pt-5">
            <i class="fas fa-bell-slash text-muted" style="font-size: 4rem;"></i>
            <h5 class="mt-3" style="color: var(--text-primary);">No Notifications</h5>
        </div>
        {% endif %}

        {% for n in notifications %}
        <div class="notif-card {% if not n.is_read %}unread{% endif %}">
            <div class="d-flex justify-content-between">
                <strong>{{ n.title }}</strong>
                {% if not n.is_read %}
                <span class="badge" style="background: var(--accent);">NEW</span>
                {% endif %}
            </div>
            <p class="mb-1 mt-2">{{ n.message }}</p>
            <small class="text-muted">{{ n.created_at.strftime('%d-%m-%Y %H:%M') }}</small>
            
            {% if not n.is_read %}
            <a href="{{ url_for('mobile_mark_notif', notif_id=n.id) }}" 
               class="btn btn-sm btn-outline-secondary mt-2 w-100">
                Mark as Read
            </a>
            {% endif %}
        </div>
        {% endfor %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
